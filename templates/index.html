<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Viki - 文档百科</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>文档目录</h2>
            </div>
            <div class="tree-container" id="treeContainer">
                <div class="loading">加载中...</div>
            </div>
        </aside>
        
        <main class="main-content">
            <div class="content-header">
                <h1 id="documentTitle">选择一个文档</h1>
                <div class="header-actions">
                    <button id="editBtn" class="btn btn-primary" style="display: none;">编辑</button>
                    <button id="revisionsBtn" class="btn btn-info" style="display: none;">修订记录</button>
                </div>
            </div>
            
            <div id="viewMode" class="content-view">
                <div id="markdownContent" class="markdown-content"></div>
            </div>
            
            <div id="revisionsPanel" class="revisions-panel" style="display: none;">
                <h3>修订记录</h3>
                <div id="revisionsList"></div>
            </div>
            
            <div id="editMode" class="content-edit" style="display: none;">
                <div class="edit-form">
                    <div class="form-group">
                        <label for="authorName">修改人姓名：</label>
                        <input type="text" id="authorName" placeholder="请输入您的姓名" required>
                    </div>
                    <textarea id="markdownEditor" class="markdown-editor"></textarea>
                    <div class="edit-actions">
                        <button id="saveBtn" class="btn btn-success">保存修改</button>
                        <button id="cancelBtn" class="btn btn-secondary">取消</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
